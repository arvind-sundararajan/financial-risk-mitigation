version: '3.9'
services:
  app:
    build: .
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=production
    ports:
      - "5000:5000"
    depends_on:
      - db
    restart: always
  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=financial_risk_mitigation
    volumes:
      - db-data:/var/lib/postgresql/data
volumes:
  db-data: